name: Go Quality

on:
  push:
    branches:
      - master
    paths:
      - "api/**"
      - ".golangci.yml"
      - ".github/workflows/go-quality.yml"
      - "Dockerfile.onnx"
      - "docs/onnx-artifacts/**"
      - "tools/verify_onnx_artifacts.py"
      - "README.md"
  pull_request:
    branches:
      - master
    paths:
      - "api/**"
      - ".golangci.yml"
      - ".github/workflows/go-quality.yml"
      - "Dockerfile.onnx"
      - "docs/onnx-artifacts/**"
      - "tools/verify_onnx_artifacts.py"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Go tests and lint
    runs-on: ubuntu-latest
    # M043 S01: timeout bumped from 10 to 15 minutes after enabling 5 additional
    # linters (gosec, bodyclose, prealloc, errorlint, revive). 12 linters in fail mode
    # is ~50% slower than the original 7; 15 min gives headroom for future growth.
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: api/go.sum

      - name: Run Go tests
        working-directory: api
        run: go test ./... -short

      - name: Verify ONNX artifact contract metadata
        run: |
          python3 -m py_compile tools/verify_onnx_artifacts.py
          python3 tools/verify_onnx_artifacts.py \
            --onnx-manifest docs/onnx-artifacts/user-bge-m3-dense-fp32.json \
            --native-tokenizer-manifest docs/onnx-artifacts/hf-tokenizers-linux-amd64.json \
            --allow-missing >/tmp/fd-onnx-artifacts-ci.json
          python3 -m json.tool /tmp/fd-onnx-artifacts-ci.json >/dev/null

      - name: Ensure native ONNX binaries are not tracked
        run: |
          tracked="$(git ls-files | awk '
            $0 ~ /\.onnx$/ && $0 != "Dockerfile.onnx" { print }
            $0 ~ /libtokenizers\.a$/ { print }
            $0 ~ /libonnxruntime\.so(\.|$)/ { print }
          ')"
          if [ -n "$tracked" ]; then
            echo "Tracked ONNX/native runtime binaries are not allowed:"
            echo "$tracked"
            exit 1
          fi

      - name: Run GolangCI-Lint with Staticcheck + Tier 1 linters
        working-directory: api
        run: |
          go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 \
            run --config ../.golangci.yml ./...
        # M043 S01: this step now runs 12 linters (M040 baseline 7 + Tier 1 5).
        # Tier 1: gosec, bodyclose, prealloc, errorlint, revive.
        # All in fail mode (severity: error). See .golangci.yml for details.
