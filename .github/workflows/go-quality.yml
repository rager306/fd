name: Go Quality

on:
  push:
    branches:
      - master
    paths:
      - "api/**"
      - ".golangci.yml"
      - ".github/workflows/go-quality.yml"
      - "README.md"
  pull_request:
    branches:
      - master
    paths:
      - "api/**"
      - ".golangci.yml"
      - ".github/workflows/go-quality.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Go tests and lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: api/go.sum

      - name: Run Go tests
        working-directory: api
        run: go test ./... -short

      - name: Run GolangCI-Lint with Staticcheck
        working-directory: api
        run: |
          go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 \
            run --config ../.golangci.yml ./...
