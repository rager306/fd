services:
  tei:
    # Keep override aligned with docker-compose.yaml; command replacement in
    # compose overrides is total, not merged.
    command: --model-id /data/models--deepvk--USER-bge-m3/snapshots/0cc6cfe48e260fb0474c753087a69369e88709ae --max-batch-tokens 8192
    healthcheck:
      start_period: 300s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fd_api
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      TEI_URL: "http://tei:80"
      REDIS_HOST: "redis:6379"
      MODEL_ID: "${MODEL_ID:-deepvk/USER-bge-m3}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-50}"
      REDIS_CACHE_TTL: "${REDIS_CACHE_TTL:-}"
      REDIS_CACHE_NO_EXPIRE: "${REDIS_CACHE_NO_EXPIRE:-}"
      EMBEDDING_CACHE_VERSION: "${EMBEDDING_CACHE_VERSION:-}"
      EMBEDDING_MODEL_ID: "${EMBEDDING_MODEL_ID:-}"
      EMBEDDING_MODEL_REVISION: "${EMBEDDING_MODEL_REVISION:-}"
      EMBEDDING_TOKENIZER_VERSION: "${EMBEDDING_TOKENIZER_VERSION:-}"
      EMBEDDING_CHUNKING_VERSION: "${EMBEDDING_CHUNKING_VERSION:-}"
      GIN_MODE: "release"
    depends_on:
      tei:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  redis:
    ports:
      - "127.0.0.1:6379:6379"
